name: Build Bone Anatomy GLB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - generate_bone_anatomy.py
      - .github/workflows/build-glb.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy trimesh

      - name: Generate GLB
        run: python generate_bone_anatomy.py

      - name: Commit generated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Bone_Anatomy_Prototype.glb
          if git diff --cached --quiet; then
            echo "No model changes to commit"
          else
            git commit -m "Build bone anatomy GLB"
            git push
          fi
